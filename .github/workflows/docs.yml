name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up March
        uses: march-language/setup-march@main

      - name: Install march_doc
        run: forge install march_doc

      - name: Generate docs
        run: forge march_doc.doc

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/depot
          publish_branch: gh-pages
          force_orphan: true
