name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]

    runs-on: ${{ matrix.os }}

    # Bound the job: the native test runner can deadlock at process exit on
    # some suites, and an unbounded hang would otherwise consume the full
    # default job limit before failing.
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: depot_test
          # The live tests use default_config(...) with password=None (they assume
          # a Postgres that trusts local connections). postgres:17 otherwise
          # requires scram-sha-256, so passwordless connects time out. Trust all
          # connections to match the test fixture.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: depot_test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/depot_test

    steps:
      - uses: actions/checkout@v4

      # The march compiler links native compression/hash stubs
      # (compress_stubs.c → -DMARCH_HAVE_BROTLI -DMARCH_HAVE_ZSTD, plus blake3).
      # setup-march builds these during a cache miss but does not persist the
      # system libraries across cache hits, so install the dev headers + libs
      # unconditionally before setup so the toolchain build always finds them.
      - name: Install native deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libbrotli-dev libzstd-dev
          # blake3 is not packaged in the default Ubuntu repos — build from source.
          git clone --depth 1 https://github.com/BLAKE3-team/BLAKE3.git /tmp/blake3-ci
          cd /tmp/blake3-ci/c
          cc -shared -fPIC -O2 -o libblake3.so \
            blake3.c blake3_dispatch.c blake3_portable.c \
            blake3_sse2_x86-64_unix.S blake3_sse41_x86-64_unix.S \
            blake3_avx2_x86-64_unix.S blake3_avx512_x86-64_unix.S
          sudo install -m 755 libblake3.so /usr/local/lib/libblake3.so
          sudo ldconfig

      # Pinned (not @main): depot's CI doubles as a canary for march's stdlib/
      # toolchain, so an unrelated upstream regression on march's main can
      # turn depot's CI red with nothing to fix on depot's side. Bump this
      # SHA deliberately when picking up new march changes.
      - name: Set up March
        uses: march-language/setup-march@main
        with:
          march-version: c00a6b1c8f3c740a24c514db83d98b6e03b09511

      - name: Build
        run: forge build

      # Run tests through the interpreter. Native test binaries currently fail
      # to link against march's record_* introspection builtins (interpreter-only;
      # no native lowering yet), so the interpreter is the validated path until
      # that lands. The full suite (5275 tests) passes this way.
      - name: Test
        run: forge test
        env:
          MARCH_TEST_INTERPRETER: "1"
